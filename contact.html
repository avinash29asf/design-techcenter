<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <a href="index.html"><img src="images/logo.svg" alt="Design and Tech Center" class="logo-img"></a>
    </div>

    <nav id="navMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div style="display:flex;align-items:center;">
        <button class="menu-toggle" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Toggle Dark/Light Mode">&#9790;</button>
    </div>
</header>

<section style="margin-top:100px;">

    <h2>Contact Us</h2>

    <div class="contact-info card">
        <h3>Design and Tech Center</h3>
        <p><strong>Phone:</strong> 9075380880</p>
        <p><strong>Email:</strong> design030599@gmail.com</p>
        <p><strong>Address:</strong> Nigdi, Pune - 411044</p>
        <br>
        <a href="tel:9075380880" class="btn">Call Now</a>
        <a href="https://wa.me/919075380880" class="btn" style="background:#25D366;">WhatsApp</a>
    </div>

    <form class="card">
        <input type="text" placeholder="Your Name" required><br><br>
        <input type="email" placeholder="Your Email" required><br><br>
        <input type="text" placeholder="Subject" required><br><br>
        <textarea rows="5" placeholder="Message"></textarea><br><br>
        <button class="btn">Send Message</button>
    </form>

</section>

<footer>
    <p>&copy; 2026 Design and Tech Center</p>
</footer>

<script>
function toggleMenu(){
    var nav = document.getElementById('navMenu');
    var btn = document.querySelector('.menu-toggle');
    nav.classList.toggle('active');
    btn.classList.toggle('active');
}

document.querySelectorAll('#navMenu a').forEach(function(link){
    link.addEventListener('click', function(){
        document.getElementById('navMenu').classList.remove('active');
        document.querySelector('.menu-toggle').classList.remove('active');
    });
});

function toggleTheme(){
    var html = document.documentElement;
    var btn = document.getElementById('themeBtn');
    if(html.getAttribute('data-theme') === 'dark'){
        html.removeAttribute('data-theme');
        btn.innerHTML = '&#9790;';
        localStorage.setItem('theme', 'light');
    } else {
        html.setAttribute('data-theme', 'dark');
        btn.innerHTML = '&#9728;';
        localStorage.setItem('theme', 'dark');
    }
}

(function(){
    var saved = localStorage.getItem('theme');
    if(saved === 'dark'){
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('themeBtn').innerHTML = '&#9728;';
    }
})();
</script>

</body>
</html>
